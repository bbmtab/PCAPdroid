name: Android CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 cmake;3.22.1 ndk;28.2.13676358'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (standardDebug)
        run: ./gradlew :app:testStandardDebugUnitTest --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 cmake;3.22.1 ndk;28.2.13676358'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleStandardRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-standard
          path: app/build/outputs/apk/standard/release/*.apk
          retention-days: 7

  e2e-test:
    name: E2E Tests (Emulator)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 cmake;3.22.1 ndk;28.2.13676358'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-standard
          path: apk/

      - name: Start Emulator
        uses: android-actions/start-emulator@v2
        with:
          api-level: 36
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 2048 -partition-size 4096
          script: |
            echo "Waiting for emulator to boot..."
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            echo "Emulator booted"
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

      - name: Install APK
        run: |
          adb install -r apk/*.apk

      - name: Grant VPN Permission
        run: |
          adb shell am start -n com.adbye.filter/.activities.MainActivity
          sleep 3
          # Accept VPN permission dialog (if shown) - run the AcceptVpnDialogTest UIAutomator test
          adb shell uiautomator runtest -c com.adbye.filter.ui.AcceptVpnDialogTest .

      - name: Run E2E Instrumented Tests
        run: |
          ./gradlew :app:connectedStandardDebugAndroidTest --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        timeout-minutes: 35
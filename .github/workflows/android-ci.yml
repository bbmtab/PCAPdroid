name: Android CI/CD

on:
  push:
    branches: [master, debug-emulator]
  pull_request:
    branches: [master, debug-emulator]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-30 build-tools;30.0.3 cmake;3.22.1 ndk;25.1.8937393'

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (standardDebug)
        run: ./gradlew :app:testStandardDebugUnitTest --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-30 build-tools;30.0.3 cmake;3.22.1 ndk;25.1.8937393'

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleStandardRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-standard
          path: app/build/outputs/apk/standard/release/*.apk
          retention-days: 7

  e2e-test:
    name: E2E Tests (Emulator)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-30 build-tools;30.0.3 cmake;3.22.1 ndk;25.1.8937393'

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start Emulator & Run E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_5
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 2048 -partition-size 4096 -debug-init -no-metrics
          disable-animations: false
          # CRITICAL ARCHITECTURE: android-emulator-runner@v2 boots the emulator, runs
          # `script:`, then TERMINATES the emulator (step log shows "Terminate Emulator"
          # -> `adb emu kill`). So ALL emulator-dependent work -- installing the app,
          # granting the VPN appop, and the gradle instrumented-test run itself -- MUST
          # live inside this `script:` block. Steps placed after this action execute with
          # NO device, so any `adb`/`wait-for-device` there blocks forever (this is exactly
          # what canceled run 28729987723: Install APK hung 39 min on `adb wait-for-device`
          # until the 50-min job timeout).
          #
          # GOTCHA: the action splits `script:` on newlines and runs EACH LINE as its own
          # `/usr/bin/sh -c <line>`. So every command MUST be a single self-contained line:
          # no multi-line for/while/if blocks (the `do` line lands alone and parse-errors),
          # and variables do NOT persist across lines. Use `;` plus `&&`/`||` to keep any
          # compound construct on ONE physical line.
          #
          # The app under test is com.adbye.filter.debug (standardDebug variant has
          # applicationIdSuffix '.debug'). `connectedStandardDebugAndroidTest` does its own
          # `adb install -r` of the debug apk then `am instrument`; we pre-install + pre-grant
          # ACTIVATE_VPN so the reinstall (same package uid -> appops preserved) has the VPN
          # already authorized, and VpnService.prepare() returns null without a dialog.
          script: |
            echo "Waiting for emulator to finish booting..."
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            echo "Boot complete. Waiting for PackageManager service to stabilize..."
            # WHY: on the non-KVM swiftshader emulator, system services (package, settings)
            # keep returning `cmd: Can't find service: package` for *minutes* after
            # sys.boot_completed=1. Run 28732010023 died here at 06:46 -- 4 min *after* boot
            # completed -- `installStandardDebug` -> InstallException. Run 28764550095 hit the
            # same error AFTER the gate passed (1-shot `pm list packages` worked but full
            # `pm install create` from gradle's ddmlib hit "Can't find service: package" 2 min
            # later). So we now require 5x consecutive `pm list packages -d android` confirms
            # bounded to 240 x 2s = 480s, AND run a heavy PMS warm-up (cmd package
            # install-existing) below before gradle takes over.
            adb shell 'i=0; n=0; while [ $i -lt 240 ] && [ $n -lt 5 ]; do i=$((i+1)); pm list packages -d android >/dev/null 2>&1 && n=$((n+1)) || n=0; sleep 2; done; test $n -ge 5'
            echo "PackageManager stable. Warming PMS with synthetic install-existing..."
            # WHY: `pm list packages` only proves PMS is responsive to a LIGHT call -- but
            # gradle's ddmlib install actually invokes `pm install create` + commit, which
            # bind PMS heavier. On the AOSP default image (no GMS keeping PMS warm) the heavy
            # path flakes for ~minutes after boot. We hammer a real PMS state-changing call
            # (`cmd package install-existing com.android.shell`) up to 5x; one success in a
            # row is enough to prove PMS is ready for install. If PMS is dead, we proceed
            # anyway (warn) -- gradle's 5x install retry below will catch the case.
            ok_w=0; for w in 1 2 3 4 5; do if adb shell cmd package install-existing com.android.shell >/dev/null 2>&1; then ok_w=1; break; fi; sleep 4; done; echo "PMS warmup ok=$ok_w (1 = PMS responded; 0 = proceeding to gradle anyway)"
            echo "Warming animation settings..."
            adb shell settings put global window_animation_scale 0 2>/dev/null || true
            adb shell settings put global transition_animation_scale 0 2>/dev/null || true
            adb shell settings put global animator_duration_scale 0 2>/dev/null || true
            echo "Building + installing the DEBUG app under test (com.adbye.filter.debug)..."
            # Retry install up to 5x with 30s gaps. The whole construct is ONE physical line
            # so the action's per-line sh -c splits it fine. Each gradle invocation re-spawns
            # ddmlib; on the AOSP image PMS can take a few minutes to fully warm, so 30s gaps
            # let PMS finish settling between attempts. `[ $ok -eq 1 ]` makes the line fail
            # loud if all 5 attempts bomb.
            ok=0; for i in 1 2 3 4 5; do GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2g" ./gradlew :app:installStandardDebug --no-daemon && { ok=1; break; }; echo "install attempt $i of 5 failed; sleeping 30s"; sleep 30; done; [ $ok -eq 1 ]
            echo "Pre-granting VPN authorization for the DEBUG app under test..."
            adb shell appops set com.adbye.filter.debug ACTIVATE_VPN allow
            adb shell appops get com.adbye.filter.debug ACTIVATE_VPN
            echo "Letting adbd settle before the test task re-fetches device properties..."
            # WHY: connectedStandardDebugAndroidTest spawns a FRESH ddmlib session that
            # re-discovers the device and re-fetches ro.build.version.sdk / ABI / density
            # to run its compatibility check. Right after the 4-min install + appops grant,
            # the slow swiftshader emulator doesn't answer `getprop` within ddmlib's default
            # 2s shell timeout -> PropertyFetcher throws ShellCommandUnresponsiveException
            # -> device is marked "Unknown API Level" -> gradle rejects it as "No compatible
            # devices" -> BUILD FAILED (this is exactly what failed run b7086a86 at 09:13:40,
            # ~55s after install succeeded at 09:12:39). A 30s settle lets adbd drain. The
            # 2x retry below catches a residual race where the property fetch still flakes.
            sleep 30
            adb wait-for-device
            echo "Running E2E instrumented tests on the live emulator (up to 3 attempts)..."
            # 3 retries on transient PropertyFetcher races (run b7086a86 hit it at 09:13:40,
            # ~55s after install succeeded; settle gives adbd drain time before retries).
            # Each attempt sleeps 30s + adb wait-for-device to let adbd recover.
            ok=0; for i in 1 2 3; do GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2g" ./gradlew :app:connectedStandardDebugAndroidTest --no-daemon && { ok=1; break; }; echo "Test attempt $i of 3 failed (likely property-fetch race), sleeping 30s..."; sleep 30; adb wait-for-device; done; [ $ok -eq 1 ]
          emulator-boot-timeout: 1200